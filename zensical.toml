[project]
site_name = "SPM For KMP documentation"
site_url = "https://spmforkmp.eu/"
site_description = "A modern alternative to CocoaPods with a custom Swift-Import bridge for Kotlin Multiplatform."
site_author = "François Dabonot"
repo_url = "https://github.com/frankois944/spm4Kmp"

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]

nav = [
  {"Swift Package Manager For Kotlin Multiplatform" = [
    "index.md",
    "migration/migrateFromCocoapods.md",
    "license.md"
  ]},
  {"Setup" = [
    "setup.md",
    "bridge.md",
    "bridgeWithDependencies.md",
    "exportingDependencies.md",
    "migration/migration_from_0.x.md",
    {"Help" = [
      "section-help/index.md",
      "section-help/issues.md",
      "section-help/faq.md",
      "section-help/tips.md"
    ]}
  ]},
  {"Usages" = [
    "usages/multiTarget.md",
    "usages/distribution.md",
    "usages/largebridge.md",
    "usages/importCLangFramework.md",
    "usages/packageRegistry.md"
  ]},
  {"References" = [
    "references/swiftPackageConfig.md",
    {"Dependencies" = [
      "references/dependency/dependencyConfig.md",
      "references/dependency/productPackageConfig.md",
      "references/dependency/productName.md"
    ]},
    {"ExportedPackage" = [
      "references/exportedPackageConfig.md"
    ]},
    {"BridgeSettings" = [
      "references/bridgeSettingsConfig.md",
      "references/targetSettingsConfigs/CSettingConfig.md",
      "references/targetSettingsConfigs/CxxSettingConfig.md",
      "references/targetSettingsConfigs/LinkerSettingConfig.md",
      "references/targetSettingsConfigs/SwiftSettingConfig.md"
    ]}
  ]}
]

[project.theme]
variant = "classic"
logo = "assets/img.png"
custom_dir = "docs/overrides"
features = [
  "navigation.footer",
  "navigation.top",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.expand",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.indexes",
  "search.suggest",
  "search.highlight",
  "search.share",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
]
palette = [
  { media = "(prefers-color-scheme)", primary = "deep purple", toggle = { icon = "material/brightness-auto", name = "Switch to light mode" } },
  { media = "(prefers-color-scheme: light)", scheme = "default", primary = "deep purple", toggle = { icon = "material/brightness-7", name = "Switch to dark mode" } },
  { media = "(prefers-color-scheme: dark)", scheme = "slate", primary = "deep purple", toggle = { icon = "material/brightness-4", name = "Switch to system preference" } },
]

[project.plugins.search]

[project.plugins.social]

[project.plugins.tags]

[project.plugins.glightbox]

[project.extra.annotate]
json = [".s2"]

[project.extra.analytics]
provider = "google"
property = "G-KKDWJKFYV1"

[project.extra.analytics.feedback]
title = "Was this page helpful?"
ratings = [
  { icon = "material/emoticon-happy-outline", name = "This page was helpful", data = 1, note = "Thanks for your feedback!" },
  { icon = "material/emoticon-sad-outline", name = "This page could be improved", data = 0, note = "Thanks for your feedback! Help us improve this page by using our <a href=\"https://github.com/frankois944/spm4Kmp/issues/new/?title=[Feedback]+{title}+-+{url}\" target=\"_blank\" rel=\"noopener\">feedback form</a>." },
]

[[project.extra.social]]
icon = "material/coffee"
link = "https://ko-fi.com/frankois944"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/francois-dabonot/"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/frankois944"

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.admonition]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.critic]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
use_pygments = true
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
